name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  version-guard:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version bump
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF"
          CURRENT_VERSION=$(node -e 'const pkg = require("./package.json"); console.log(pkg.version)')
          BASE_VERSION=$(git show "origin/${BASE_REF}:package.json" | node -e 'const fs = require("node:fs"); const input = fs.readFileSync(0, "utf8"); const json = JSON.parse(input); console.log(json.version);')
          if [ "$CURRENT_VERSION" = "$BASE_VERSION" ]; then
            echo "package.json version must be bumped before merging to ${BASE_REF}."
            exit 1
          fi
