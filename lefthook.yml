pre-commit:
  jobs:
    - group:
        parallel: false
        jobs:
          - name: fmt
            run: bun run fmt
          - name: lint-fix
            run: bun run lint:fix
    - group:
        parallel: true
        jobs:
          - name: fmt-check
            run: bun run fmt:check
          - name: lint
            run: bun run lint
          - name: knip
            run: bun run knip
          - name: test
            run: bun run test
